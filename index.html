<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!--
    ═══════════════════════════════════════════════════════
    CyberRisk Intelligence Platform — Wiki del Proyecto
    Plataforma de Inteligencia de Amenazas para PYMEs CO
    ═══════════════════════════════════════════════════════
    El contenido de cada sección se carga desde archivos
    JSON en /data/sections/ mediante fetch().
    Para agregar una sección nueva:
      1. Crea data/sections/mi-seccion.json
      2. Agrega la entrada en data/nav.json
    ═══════════════════════════════════════════════════════
  -->

  <!-- SEO básico -->
  <title>CyberRisk Intelligence Platform — Wiki</title>
  <meta name="description" content="Plataforma de Inteligencia de Amenazas para PYMEs Colombianas. Análisis predictivo de vulnerabilidades mediante Big Data y Machine Learning." />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph -->
  <meta property="og:title"       content="CyberRisk Intelligence Platform" />
  <meta property="og:description" content="Plataforma de Inteligencia de Amenazas para PYMEs Colombianas." />
  <meta property="og:type"        content="website" />

  <!-- Favicon inline (sin archivos extra) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%2305080c'/><text x='50%' y='58%' dominant-baseline='middle' text-anchor='middle' font-size='18' fill='%2300c8e8'>⬡</text></svg>" />

  <!-- Estilos -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="assets/css/main.css" />
</head>
<body>

  <!-- ══════════════════════════════════════════
       HEADER — Se rellena con datos de nav.json
  ══════════════════════════════════════════ -->
  <header id="app-header" role="banner">

    <div class="header-logo">
      <!-- Logo marca -->
      <div class="logo-mark" aria-hidden="true">CR</div>
      <div>
        <div class="logo-text"><span>Cyber</span>Risk<span>.wiki</span></div>
        <div class="logo-sub">PYMEs Colombia · IA · Big Data · ML</div>
      </div>
    </div>

    <!-- Metadato de versión / sprint — llenado por app.js -->
    <div class="header-meta" id="header-meta" aria-label="Versión del proyecto">Cargando…</div>

    <!-- Indicador de estado -->
    <div class="header-status" aria-label="Estado del sistema">
      <span class="status-dot" aria-hidden="true"></span>
      <span>ACTIVO</span>
    </div>

    <!-- Hamburguesa — solo visible en móvil -->
    <button id="menu-toggle" aria-label="Abrir menú" aria-expanded="false" aria-controls="app-sidebar">
      <span></span>
      <span></span>
      <span></span>
    </button>

  </header>

  <!-- Overlay oscuro detrás del sidebar en móvil -->
  <div id="sidebar-overlay" aria-hidden="true"></div>

  <!-- ══════════════════════════════════════════
       SIDEBAR — fuera del layout para que
       position:fixed funcione bien en móvil
  ══════════════════════════════════════════ -->
  <aside id="app-sidebar" role="navigation" aria-label="Navegación del proyecto">

    <!-- Los nav-items se inyectan aquí por app.js -->
    <nav id="sidebar-nav" aria-label="Secciones del proyecto"></nav>

    <!-- Panel de información del proyecto -->
    <div class="sidebar-info" role="complementary" aria-label="Información del proyecto">
      <div class="info-row">
        <span class="info-key">versión</span>
        <span class="info-val" id="info-version">—</span>
      </div>
      <div class="info-row">
        <span class="info-key">sprint</span>
        <span class="info-val" id="info-sprint">—</span>
      </div>
      <div class="info-row">
        <span class="info-key">estado</span>
        <span class="info-val active-val" id="info-status">—</span>
      </div>
    </div>

  </aside>

  <!-- ══════════════════════════════════════════
       LAYOUT: SIDEBAR PLACEHOLDER + CONTENIDO
  ══════════════════════════════════════════ -->
  <div id="app-layout">

    <!-- Columna izquierda vacía — el sidebar real está fuera del layout
         pero ocupa esta columna en desktop via position:sticky -->
    <div id="sidebar-spacer" aria-hidden="true"></div>

    <!-- ÁREA DE CONTENIDO PRINCIPAL -->
    <!-- Todo el contenido se inyecta aquí dinámicamente por app.js + renderer.js -->
    <main id="app-content" role="main" aria-live="polite" aria-label="Contenido de la sección">
      <!-- El spinner inicial lo muestra app.js en el evento DOMContentLoaded -->
    </main>

  </div><!-- /#app-layout -->

  <!-- ══════════════════════════════════════════
       FOOTER
  ══════════════════════════════════════════ -->
  <footer id="app-footer" role="contentinfo">
    <span>© <span id="footer-year"></span> — CyberRisk Intelligence Platform</span>
    <span>
      Repositorio:
      <a id="footer-repo" href="#" target="_blank" rel="noopener noreferrer">[cargando…]</a>
    </span>
    <span>HTML · CSS · JS Vanilla · JSON</span>
  </footer>

  <!--
    ══════════════════════════════════════════
    SCRIPTS — cargados en orden de dependencia
    ══════════════════════════════════════════
    1. loader.js   — Carga y caché de JSON (fetchJSON, loadNav, loadSection)
    2. renderer.js — Convierte objetos JSON en HTML (renderSection, RENDERERS)
    3. app.js      — Controlador principal (init, navigateTo, buildSidebar)
  -->
  <script src="assets/js/loader.js"></script>
  <script src="assets/js/renderer.js"></script>
  <script src="assets/js/app.js"></script>

</body>
</html>
